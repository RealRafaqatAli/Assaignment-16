<!DOCTYPE html>
<html lang="en">
<head>
    <link rel="stylesheet" href="ludo.css">
</head>
<body>
    <!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ludo Board - HTML & CSS</title>
    <style>
        /* --- General Reset --- */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background-color: #2c3e50;
            font-family: Arial, sans-serif;
        }

        /* --- Main Board Container --- */
        .ludo-board {
            width: 450px;
            height: 450px;
            background: #fff;
            border: 5px solid #000;
            display: grid;
            grid-template-columns: repeat(15, 1fr);
            grid-template-rows: repeat(15, 1fr);
            box-shadow: 0 0 20px rgba(0,0,0,0.5);
        }

        /* --- Common Cell Styles --- */
        .cell {
            border: 0.5px solid #ccc;
            position: relative;
        }

        /* --- Homes (The 4 Corners) --- */
        .home {
            grid-row: span 6;
            grid-column: span 6;
            border: 1px solid #000;
            padding: 15px;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .home-inner {
            width: 100%;
            height: 100%;
            background: #fff;
            border-radius: 10px;
            display: grid;
            grid-template-columns: 1fr 1fr;
            grid-template-rows: 1fr 1fr;
            place-items: center;
        }

        .token {
            width: 30px;
            height: 30px;
            border-radius: 50%;
            border: 2px solid rgba(0,0,0,0.2);
            box-shadow: 2px 2px 5px rgba(0,0,0,0.3);
        }

        /* --- Colors for Homes --- */
        .red { background-color: #ff4757; }
        .green { background-color: #2ed573; }
        .blue { background-color: #1e90ff; }
        .yellow { background-color: #ffa502; }

        .red .token { background-color: #ff4757; }
        .green .token { background-color: #2ed573; }
        .blue .token { background-color: #1e90ff; }
        .yellow .token { background-color: #ffa502; }

        /* --- Center Square --- */
        .center-home {
            grid-column: 7 / span 3;
            grid-row: 7 / span 3;
            background: conic-gradient(
                #2ed573 0deg 90deg, 
                #1e90ff 90deg 180deg, 
                #ffa502 180deg 270deg, 
                #ff4757 270deg 360deg
            );
            border: 1px solid #000;
            position: relative;
        }
        
        /* Center Triangle Overlay for detail */
        .center-home::after {
            content: 'WIN';
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-weight: bold;
            color: #fff;
            text-shadow: 1px 1px 2px #000;
            font-size: 1.2rem;
        }

        /* --- Paths (The White Cells) --- */
        /* Top Path */
        .path-top { grid-column: 7 / span 3; grid-row: 1 / span 6; background: #fff; }
        /* Bottom Path */
        .path-bottom { grid-column: 7 / span 3; grid-row: 10 / span 6; background: #fff; }
        /* Left Path */
        .path-left { grid-column: 1 / span 6; grid-row: 7 / span 3; background: #fff; }
        /* Right Path */
        .path-right { grid-column: 10 / span 6; grid-row: 7 / span 3; background: #fff; }

        /* --- Colored Path Cells (Safe Zones) --- */
        /* We use specific grid positions to color individual cells */
        
        /* Red Path */
        .c-red-1 { grid-column: 2; grid-row: 7; background: #ff4757; }
        .c-red-2 { grid-column: 3; grid-row: 7; background: #ff4757; }
        .c-red-3 { grid-column: 4; grid-row: 7; background: #ff4757; }
        .c-red-4 { grid-column: 5; grid-row: 7; background: #ff4757; }
        .c-red-5 { grid-column: 6; grid-row: 7; background: #ff4757; }
        .c-red-start { grid-column: 7; grid-row: 3; background: #ff4757; border: 1px solid #000;}

        /* Green Path */
        .c-green-1 { grid-column: 9; grid-row: 2; background: #2ed573; }
        .c-green-2 { grid-column: 9; grid-row: 3; background: #2ed573; }
        .c-green-3 { grid-column: 9; grid-row: 4; background: #2ed573; }
        .c-green-4 { grid-column: 9; grid-row: 5; background: #2ed573; }
        .c-green-5 { grid-column: 9; grid-row: 6; background: #2ed573; }
        .c-green-start { grid-column: 13; grid-row: 7; background: #2ed573; border: 1px solid #000;}

        /* Blue Path */
        .c-blue-1 { grid-column: 14; grid-row: 9; background: #1e90ff; }
        .c-blue-2 { grid-column: 13; grid-row: 9; background: #1e90ff; }
        .c-blue-3 { grid-column: 12; grid-row: 9; background: #1e90ff; }
        .c-blue-4 { grid-column: 11; grid-row: 9; background: #1e90ff; }
        .c-blue-5 { grid-column: 10; grid-row: 9; background: #1e90ff; }
        .c-blue-start { grid-column: 9; grid-row: 13; background: #1e90ff; border: 1px solid #000;}

        /* Yellow Path */
        .c-yellow-1 { grid-column: 7; grid-row: 14; background: #ffa502; }
        .c-yellow-2 { grid-column: 7; grid-row: 13; background: #ffa502; }
        .c-yellow-3 { grid-column: 7; grid-row: 12; background: #ffa502; }
        .c-yellow-4 { grid-column: 7; grid-row: 11; background: #ffa502; }
        .c-yellow-5 { grid-column: 7; grid-row: 10; background: #ffa502; }
        .c-yellow-start { grid-column: 3; grid-row: 9; background: #ffa502; border: 1px solid #000;}

        /* Star/Safe Icons (Using CSS content) */
        .star::before {
            content: '★';
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: rgba(0,0,0,0.3);
            font-size: 1.2rem;
        }

    </style>
</head>
<body>

    <div class="ludo-board">
        <!-- TOP LEFT: RED HOME -->
        <div class="home red">
            <div class="home-inner">
                <div class="token"></div>
                <div class="token"></div>
                <div class="token"></div>
                <div class="token"></div>
            </div>
        </div>

        <!-- TOP PATH (Vertical White Area) -->
        <div class="path-top">
            <!-- Cells generated via grid logic in CSS, adding specific colored ones -->
            <div class="cell c-red-start star"></div> <!-- Red Start -->
            <div class="cell"></div><div class="cell"></div>
            <div class="cell"></div><div class="cell"></div><div class="cell"></div>
            <div class="cell"></div><div class="cell"></div><div class="cell"></div>
            <div class="cell"></div><div class="cell"></div><div class="cell"></div>
            <div class="cell"></div><div class="cell"></div><div class="cell"></div>
            <div class="cell"></div><div class="cell"></div>
        </div>

        <!-- TOP RIGHT: GREEN HOME -->
        <div class="home green">
            <div class="home-inner">
                <div class="token"></div>
                <div class="token"></div>
                <div class="token"></div>
                <div class="token"></div>
            </div>
        </div>

        <!-- LEFT PATH (Horizontal White Area) -->
        <div class="path-left">
            <div class="cell c-yellow-start star"></div> <!-- Yellow Start -->
            <div class="cell"></div><div class="cell"></div><div class="cell"></div><div class="cell"></div>
            <div class="cell c-red-1"></div><div class="cell c-red-2"></div><div class="cell c-red-3"></div><div class="cell c-red-4"></div><div class="cell c-red-5"></div>
            <div class="cell"></div><div class="cell"></div><div class="cell"></div><div class="cell"></div><div class="cell"></div>
        </div>

        <!-- CENTER HOME (Triangle) -->
        <div class="center-home"></div>

        <!-- RIGHT PATH (Horizontal White Area) -->
        <div class="path-right">
            <div class="cell"></div><div class="cell"></div><div class="cell"></div><div class="cell"></div><div class="cell"></div>
            <div class="cell c-green-1"></div><div class="cell c-green-2"></div><div class="cell c-green-3"></div><div class="cell c-green-4"></div><div class="cell c-green-5"></div>
            <div class="cell c-green-start star"></div> <!-- Green Start -->
            <div class="cell"></div><div class="cell"></div><div class="cell"></div><div class="cell"></div>
        </div>

        <!-- BOTTOM LEFT: YELLOW HOME -->
        <div class="home yellow">
            <div class="home-inner">
                <div class="token"></div>
                <div class="token"></div>
                <div class="token"></div>
                <div class="token"></div>
            </div>
        </div>

        <!-- BOTTOM PATH (Vertical White Area) -->
        <div class="path-bottom">
            <div class="cell"></div><div class="cell"></div>
            <div class="cell"></div><div class="cell"></div><div class="cell"></div>
            <div class="cell"></div><div class="cell"></div><div class="cell"></div>
            <div class="cell"></div><div class="cell"></div><div class="cell"></div>
            <div class="cell"></div><div class="cell"></div><div class="cell"></div>
            <div class="cell"></div><div class="cell"></div>
            <div class="cell c-blue-start star"></div> <!-- Blue Start -->
        </div>

        <!-- BOTTOM RIGHT: BLUE HOME -->
        <div class="home blue">
            <div class="home-inner">
                <div class="token"></div>
                <div class="token"></div>
                <div class="token"></div>
                <div class="token"></div>
            </div>
        </div>
    </div>

</body>
</html>
</body>
</html>
